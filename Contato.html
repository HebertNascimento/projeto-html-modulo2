<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template - Utilizar como modelo</title>
    <link rel="stylesheet" href="base.css">
</head>
<body>
    <div class="wrapper">
        <div class="menu">

            <ul>
                <li><a href="Index.html">Home</a></li>
                <li><a href="Sobre.html">Sobre a Clínica</a></li>
                <li><a href="Horário.html">Horário de Atendimento</a></li>
                <li><a href="Contato.html">Contato</a></li>
            </ul>
        </div>

        <div class="main">
            <div class="header">
                

                 <img src="Banner 1.jpg" alt="Bem vindo a Clínica Vida e Bem Estar">
            </div>
    
            <div class="content">

                <form name="Contato" method="post" action=""></form>
                Nome: <input type="text" name="name"><br>
                E-mail: <input type="text" name="email"><br>
                Telefone: <input type="number" name="phone"><br>
                <label">Melhor data para consulta: </label><input type="date"><br>
                <label for="">Especialidade</label>
                <select name="role" id="">
                    <option value="selecione aqui sua especialidade">Selecione a especialidade</option>
                    <option value="clinica Geral">Clínica Geral</option>
                    <option value="psicologia">Psicologia</option>
                    <option value="pediatria">Pediatria</option>
                    <option value="oftalmologia">Oftalmologia</option>
                </select>
                <br>
                <label for="">Escreva aqui sua mensagem:</label><input type="text"><br>
                <input type="button" value="Enviar"><br>

            </div>
    
            <div class="footer">
                
                <p>Clinica VIDA & BEM ESTAR</p>
                <ul>
                    <li>Clinica Geral</li>
                    <li>Psicologia</li>
                    <li>Pediatria</li>
                    <li>Oftalmologia</li>
                </ul>

            </div>
        </div>
    </div>
